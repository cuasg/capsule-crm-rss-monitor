<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Settings - Capsule Activity Monitor</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="theme-light options-page">
  <main id="settingsPage">
    <h1>Settings</h1>

    <fieldset class="option-group">
      <legend>Access</legend>
      <div class="option-row">
        <label for="capsuleToken">Capsule API Token</label>
        <input id="capsuleToken" type="password" placeholder="Paste your token here" autocomplete="off" />
      </div>
      <div class="option-row">
        <label for="openaiKey">OpenAI API Key</label>
        <input id="openaiKey" type="password" placeholder="sk-..." autocomplete="off" />
      </div>
      <p class="option-note">Credentials are stored locally in your Chrome profile so they persist across browser restarts.</p>
    </fieldset>

    <fieldset class="option-group">
      <legend>Polling & Alerts</legend>
      <div class="option-row">
        <label for="intervalSelect">Check Interval</label>
        <select id="intervalSelect">
          <option value="1">Every 1 minute</option>
          <option value="2">Every 2 minutes</option>
          <option value="5">Every 5 minutes</option>
          <option value="10">Every 10 minutes</option>
          <option value="15">Every 15 minutes</option>
          <option value="30">Every 30 minutes</option>
          <option value="60">Every 60 minutes</option>
        </select>
      </div>
      <div class="option-row option-row-checkbox">
        <label for="notifyToggle">Notifications</label>
        <label class="checkbox-label"><input type="checkbox" id="notifyToggle" /> Enable notifications</label>
      </div>
      <div class="option-row option-row-checkbox">
        <label for="soundToggle">Sound</label>
        <label class="checkbox-label"><input type="checkbox" id="soundToggle" /> Play alert sound</label>
      </div>
      <div class="option-row">
        <label for="snoozeSelect">Snooze Notifications</label>
        <select id="snoozeSelect">
          <option value="0">None</option>
          <option value="15">15 minutes</option>
          <option value="30">30 minutes</option>
          <option value="60">1 hour</option>
          <option value="120">2 hours</option>
        </select>
      </div>
    </fieldset>

    <fieldset class="option-group">
      <legend>AI Summaries</legend>
      <div class="option-row option-row-checkbox">
        <label for="enableSummaries">Summaries</label>
        <label class="checkbox-label"><input type="checkbox" id="enableSummaries" /> Generate AI summaries</label>
      </div>
      <div class="option-row">
        <label for="emailClient">Email Client</label>
        <select id="emailClient">
          <option value="default">Default system email app</option>
          <option value="gmail">Gmail</option>
        </select>
      </div>
      <p class="option-note">This setting lays the groundwork for reply shortcuts in a later phase.</p>
    </fieldset>

    <fieldset class="option-group">
      <legend>Priority Rules</legend>
      <div class="option-row">
        <label for="notifyPriorityThreshold">Notify For</label>
        <select id="notifyPriorityThreshold">
          <option value="high">High + Critical only</option>
          <option value="medium">Medium + High + Critical</option>
          <option value="critical">Critical only</option>
        </select>
      </div>
      <div class="option-row option-row-checkbox">
        <label for="showMediumInFeed">Medium Priority</label>
        <label class="checkbox-label"><input type="checkbox" id="showMediumInFeed" /> Show medium priority items in feeds</label>
      </div>
      <div class="option-row option-row-checkbox">
        <label for="hideLowPriorityInFeed">Low Priority</label>
        <label class="checkbox-label"><input type="checkbox" id="hideLowPriorityInFeed" /> Hide low-priority items from the feed by default</label>
      </div>
      <div class="option-row option-row-checkbox">
        <label for="alwaysShowReplyNeeded">Reply Needed</label>
        <label class="checkbox-label"><input type="checkbox" id="alwaysShowReplyNeeded" /> Always surface items that appear to need a reply</label>
      </div>
    </fieldset>

    <fieldset class="option-group">
      <legend>Workflow Shortcuts</legend>
      <div class="option-row">
        <label for="calendarShortcutMode">Calendar Shortcut</label>
        <select id="calendarShortcutMode">
          <option value="meeting_only">Only when AI flags a meeting</option>
          <option value="always">Always show Google Calendar shortcut</option>
        </select>
      </div>
    </fieldset>

    <fieldset class="option-group">
      <legend>Digest Automation</legend>
      <div class="option-row option-row-checkbox">
        <label for="enableDigestAutomation">Automatic Digests</label>
        <label class="checkbox-label"><input type="checkbox" id="enableDigestAutomation" /> Generate digests automatically</label>
      </div>
      <div class="option-row">
        <label for="morningDigestHour">Morning Time</label>
        <select id="morningDigestHour">
          <option value="7">7:00 AM</option>
          <option value="8">8:00 AM</option>
          <option value="9">9:00 AM</option>
          <option value="10">10:00 AM</option>
        </select>
      </div>
      <div class="option-row">
        <label for="middayDigestHour">Midday Time</label>
        <select id="middayDigestHour">
          <option value="11">11:00 AM</option>
          <option value="12">12:00 PM</option>
          <option value="13">1:00 PM</option>
          <option value="14">2:00 PM</option>
        </select>
      </div>
      <div class="option-row">
        <label for="endOfDayDigestHour">End-of-Day Time</label>
        <select id="endOfDayDigestHour">
          <option value="16">4:00 PM</option>
          <option value="17">5:00 PM</option>
          <option value="18">6:00 PM</option>
          <option value="19">7:00 PM</option>
        </select>
      </div>
    </fieldset>

    <fieldset class="option-group">
      <legend>Export</legend>
      <div class="button-row">
        <button id="exportJson" class="btn" type="button">Export JSON</button>
        <button id="exportCsv" class="btn" type="button">Export CSV</button>
      </div>
    </fieldset>

    <button id="saveBtn" class="btn btn-primary" type="button">Save Settings</button>
    <p id="saveStatus" aria-live="polite"></p>
  </main>
  <script src="options.js"></script>
</body>
</html>
